<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reportes pendentes Kimpa Vita</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <p class="eyebrow">Limpeza</p>
          <h1>Reportes pendentes</h1>
          <p class="muted">Sessao iniciada como {{ cleaner_name }}</p>
        </div>
        <form method="post" action="/cleaner/logout">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <button class="button button-secondary" type="submit">Sair</button>
        </form>
      </header>

      <section class="stats">
        <article><span>Pendentes</span><strong>{{ pending_count }}</strong></article>
      </section>

      <section class="panel account-panel">
        <h2>Dados do usuário</h2>
        <p><strong>Nome de utilizador:</strong> {{ cleaner_username }}</p>
        <p><strong>Email associado:</strong> {{ cleaner_email }}</p>
        <p><strong>Senha:</strong> ********</p>
      </section>

      <section class="panel reports">
        <div class="report-list">
          {{ report_rows }}
        </div>
      </section>
    </main>
  </body>
</html>

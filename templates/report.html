<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reportar problema - Kimpa Vita</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="page page-center">
      <form class="panel report-form" method="post" action="/report" enctype="multipart/form-data">
        <p class="eyebrow">Universidade Kimpa Vita</p>
        <h1>Reportar problema</h1>

        <label class="field">
          <span>Categoria do utilizador</span>
          <select name="categoria_utilizador" required>
            <option value="">Selecionar</option>
            {{ user_category_options }}
          </select>
        </label>

        <label class="field">
          <span>Categoria</span>
          <select id="categoria_local" name="categoria_local" required>
            <option value="">Selecionar</option>
            {{ local_category_options }}
          </select>
        </label>

        <label class="field">
          <span>Local</span>
          <select id="subcategoria_local" name="subcategoria_local" data-selected="{{ subcategoria_local }}" required>
            <option value="">Seleciona primeiro a categoria</option>
          </select>
        </label>

        <label class="field">
          <span>Curso</span>
          <select name="curso" required>
            <option value="">Selecionar</option>
            {{ course_options }}
          </select>
        </label>

        <label class="field">
          <span>Período</span>
          <select name="periodo" required>
            <option value="">Selecionar</option>
            {{ period_options }}
          </select>
        </label>

        <fieldset class="problem-grid">
          <legend>Tipo de problema</legend>
          {{ issue_options }}
        </fieldset>

        <label class="field">
          <span>Comentário (opcional)</span>
          <textarea name="description" maxlength="500" rows="4" placeholder="Descreva o problema (opcional)">{{ description }}</textarea>
        </label>

        <label class="field">
          <span>Foto obrigatória *</span>
          <input type="file" id="photos" name="foto_reporte" accept="image/*" required>
        </label>

        {{ error_html }}

        <button class="button button-primary" type="submit">Enviar</button>
      </form>
    </main>

    <script type="application/json" id="local-options-data" hidden>
      {{ local_options_json }}
    </script>

    <script>
      const localOptions = JSON.parse(document.getElementById('local-options-data').textContent);
      const categorySelect = document.getElementById('categoria_local');
      const subcategorySelect = document.getElementById('subcategoria_local');

      function syncSubcategories() {
        const selectedCategory = categorySelect.value;
        const selectedSubcategory = subcategorySelect.dataset.selected;
        const options = localOptions[selectedCategory] || [];
        subcategorySelect.innerHTML = '<option value="">Selecionar</option>';
        options.forEach(function (label) {
          const option = document.createElement('option');
          option.value = label;
          option.textContent = label;
          option.selected = label === selectedSubcategory;
          subcategorySelect.appendChild(option);
        });
      }

      categorySelect.addEventListener('change', function () {
        subcategorySelect.dataset.selected = '';
        syncSubcategories();
      });
      syncSubcategories();

      (function () {
        const cards = document.querySelectorAll('.problem-card');
        cards.forEach((card) => {
          const radio = card.querySelector('input[type="radio"]');
          if (!radio) return;
          card.addEventListener('click', () => {
            cards.forEach((c) => c.classList.remove('selected'));
            card.classList.add('selected');
            radio.checked = true;
          });
          radio.addEventListener('change', () => {
            cards.forEach((c) => {
              const r = c.querySelector('input[type="radio"]');
              c.classList.toggle('selected', r && r.checked);
            });
          });
          if (radio.checked) card.classList.add('selected');
        });
      })();
    </script>
  </body>
</html>
